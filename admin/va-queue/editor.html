<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/favcon.png" />
  <title>Review Post — Shana Gates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bronze: #C8C8C8;
      --bg:     #0a0a0a;
      --surf:   #141414;
      --surf2:  #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --text:   #fff;
      --muted:  rgba(255,255,255,0.45);
      --amber:  #f59e0b;
      --blue:   #3b82f6;
      --green:  #22c55e;
      --red:    #ef4444;
      --font:   system-ui, -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── Top nav bar ── */
    .topbar {
      background: var(--surf); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 52px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-link {
      color: var(--muted); font-size: 13px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s;
    }
    .back-link:hover { color: var(--bronze); }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .topbar-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 480px; }
    .status-pill {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px; flex-shrink: 0;
    }
    .status-media_pending { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    .status-media_ready   { background: rgba(59,130,246,0.15);  color: var(--blue);  border: 1px solid rgba(59,130,246,0.3); }
    .status-scheduled     { background: rgba(20,184,166,0.15);  color: #5eead4;      border: 1px solid rgba(20,184,166,0.3); }
    .status-published     { background: rgba(34,197,94,0.15);   color: #4ade80;      border: 1px solid rgba(34,197,94,0.3); }

    /* Republish-to-social panel (shown when post is already live) */
    .republish-card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-top: 14px; }
    .republish-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .republish-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .republish-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .btn-republish {
      width: 100%; padding: 11px; border-radius: 8px; margin-bottom: 8px;
      background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.35);
      color: #4ade80; font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background 0.15s;
    }
    .btn-republish:hover:not(:disabled) { background: rgba(34,197,94,0.22); }
    .btn-republish:disabled { opacity: 0.45; cursor: not-allowed; }
    .republish-diag { margin-top: 14px; padding: 10px 12px; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace; line-height: 1.7; }
    .republish-diag b { color: var(--text); font-weight: 600; }
    .republish-diag .env-ok { color: #4ade80; }
    .republish-diag .env-missing { color: #f87171; }

    /* ── Caption platform tabs ── */
    .tab-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .tab-btn {
      background: var(--surf2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); padding: 6px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font); display: inline-flex; align-items: center; gap: 5px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .tab-btn:hover:not(.active) { color: var(--text); border-color: rgba(200,200,200,0.3); }
    .tab-btn.active { background: rgba(255,255,255,0.08); border-color: rgba(200,200,200,0.4); color: var(--text); }
    .tab-btn .tab-icon { font-size: 13px; }

    /* ── Publish delay picker ── */
    .delay-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .delay-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .delay-btn {
      background: var(--surf2); border: 1px solid var(--border); border-radius: 6px;
      color: rgba(255,255,255,0.6); padding: 5px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .delay-btn:hover:not(.active) { color: var(--text); border-color: rgba(200,200,200,0.3); }
    .delay-btn.active {
      background: var(--bronze); color: #000; border-color: var(--bronze);
    }
    .delay-when { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
    .btn-schedule {
      width: 100%; padding: 13px; border-radius: 8px;
      background: #14b8a6; color: #000;
      border: none; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: var(--font); display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s;
    }
    .btn-schedule:hover:not(:disabled) { opacity: 0.85; }
    .btn-schedule:disabled { opacity: 0.3; cursor: not-allowed; }
    .scheduled-banner {
      background: rgba(20,184,166,0.08); border: 1px solid rgba(20,184,166,0.25);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 14px;
    }
    .scheduled-banner-title { font-size: 12px; font-weight: 700; color: #5eead4; margin-bottom: 4px; }
    .scheduled-banner-time { font-size: 13px; color: var(--text); margin-bottom: 8px; }
    .btn-cancel-schedule {
      background: none; border: 1px solid rgba(239,68,68,0.4); color: var(--red);
      border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
    }
    .btn-cancel-schedule:hover { background: rgba(239,68,68,0.08); }

    /* ── Editor grid ── */
    .editor-wrap { max-width: 1120px; margin: 0 auto; padding: 32px 24px 80px; }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .editor-grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 16px;
    }
    .card:last-child { margin-bottom: 0; }
    .card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }

    /* ── Article section ── */
    .meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .cat-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 100px;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
    }
    .post-date { font-size: 12px; color: var(--muted); }
    .title-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .title-input {
      flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent;
      color: var(--text); font-size: 20px; font-weight: 700; line-height: 1.35;
      font-family: var(--font); padding: 2px 0; width: 100%;
      transition: border-color 0.15s;
    }
    .title-input:focus { outline: none; border-bottom-color: rgba(200,200,200,0.5); }
    .title-input:hover { border-bottom-color: var(--border); }
    .suggest-btn {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); padding: 5px 11px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: var(--font); flex-shrink: 0; margin-top: 2px;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .suggest-btn:hover:not(:disabled) { border-color: rgba(200,200,200,0.4); color: var(--text); }
    .suggest-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .title-suggestions {
      display: flex; flex-direction: column; gap: 6px; margin-top: 10px;
    }
    .suggestion-pill {
      background: var(--surf2); border: 1px solid var(--border); border-radius: 7px;
      padding: 9px 13px; font-size: 13px; color: rgba(255,255,255,0.75); cursor: pointer;
      text-align: left; font-family: var(--font); transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }
    .suggestion-pill:hover { border-color: rgba(200,200,200,0.4); color: var(--text); }
    .suggestion-pill.applied { border-color: var(--bronze); color: var(--text); }
    .post-excerpt { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 12px; margin-top: 10px; }
    .source-link { font-size: 12px; color: var(--bronze); text-decoration: none; }
    .source-link:hover { text-decoration: underline; }

    /* ── Caption section ── */
    .caption-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
    .gen-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 7px;
      padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: border-color 0.15s, color 0.15s;
      display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px;
    }
    .gen-btn:hover:not(:disabled) { border-color: rgba(200,200,200,0.4); color: var(--text); }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    textarea {
      width: 100%; background: var(--surf2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; color: var(--text);
      font-family: var(--font); font-size: 14px; line-height: 1.6;
      resize: vertical; min-height: 110px; transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: rgba(200,200,200,0.4); }
    .url-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* ── Thumbnail builder ── */
    .builder-sublabel { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .prompt-area {
      font-size: 13px; line-height: 1.65; min-height: 140px;
      color: rgba(255,255,255,0.7); font-family: 'Courier New', monospace;
    }
    .copy-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
    .copy-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 7px;
      padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: border-color 0.15s, color 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .copy-btn:hover { border-color: rgba(200,200,200,0.4); color: var(--text); }
    .copy-hint { font-size: 12px; color: var(--muted); }

    /* ── Right column: Thumbnail preview ── */
    .thumb-preview-wrap {
      width: 100%; aspect-ratio: 16/9; border-radius: 8px;
      background: var(--surf2); border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-preview-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-placeholder-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(255,255,255,0.15); font-size: 13px; }
    .thumb-placeholder-inner svg { opacity: 0.3; }
    .upload-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px 16px; border-radius: 8px;
      background: var(--surf2); border: 1px solid var(--border);
      font-size: 13px; color: var(--muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .upload-label:hover { border-color: rgba(200,200,200,0.4); color: var(--text); }
    .upload-input { display: none; }
    .upload-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }

    /* ── Right column: Publish ── */
    .publish-card { position: sticky; top: 24px; }
    .publish-bullets { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 20px; }
    .publish-bullets ul { list-style: disc; padding-left: 18px; margin-top: 6px; }
    .publish-bullets p { margin-bottom: 4px; font-size: 13px; }
    .btn-publish {
      width: 100%; padding: 13px; border-radius: 8px;
      background: var(--green); color: #000;
      border: none; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: var(--font); display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s;
    }
    .btn-publish:hover:not(:disabled) { opacity: 0.85; }
    .btn-publish:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-mark-ready {
      width: 100%; padding: 11px; border-radius: 8px; margin-top: 10px;
      background: none; border: 1px solid rgba(245,158,11,0.4);
      color: var(--amber); font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: background 0.15s, border-color 0.15s;
    }
    .btn-mark-ready:hover:not(:disabled) { background: rgba(245,158,11,0.08); }
    .btn-mark-ready:disabled { opacity: 0.3; cursor: not-allowed; }
    .publish-prereq { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }

    /* ── Feedback messages ── */
    .inline-error {
      font-size: 13px; color: var(--red); margin-top: 10px;
      padding: 8px 12px; background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 6px;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px; border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    .spinner-muted {
      border-color: rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.5);
    }
    .spinner-green { border-color: rgba(0,0,0,0.15); border-top-color: #000; }

    /* ── Loading state ── */
    .loading-state { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 14px; }

    /* ── Video script textarea ── */
    textarea.script-area {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px; line-height: 1.7; min-height: 180px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.85);
    }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-bar-bg { height: 5px; background: var(--surf2); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--bronze); border-radius: 99px; transition: width 0.3s; }

    /* ── Video panel states ── */
    .panel-info {
      padding: 14px 16px; border-radius: 8px; display: flex; align-items: flex-start; gap: 12px;
    }
    .panel-info.blue  { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); }
    .panel-info.green { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.2); }
    .panel-info.amber { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
    .panel-info-icon  { font-size: 20px; flex-shrink: 0; }
    .panel-info-body  { flex: 1; min-width: 0; }
    .panel-info-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .panel-info.blue  .panel-info-title { color: var(--blue); }
    .panel-info.green .panel-info-title { color: var(--green); }
    .panel-info.amber .panel-info-title { color: var(--amber); }
    .panel-info-sub   { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* ── Platform status grid ── */
    .platform-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .platform-row  { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .platform-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; }
    .platform-name { flex: 1; color: rgba(255,255,255,0.7); }
    .platform-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
    .pstatus-polling { background: rgba(59,130,246,0.12); color: var(--blue); }
    .pstatus-done    { background: rgba(34,197,94,0.12);  color: var(--green); }
    .pstatus-error   { background: rgba(239,68,68,0.12);  color: var(--red); }
    .pstatus-idle    { background: rgba(255,255,255,0.05); color: var(--muted); }

    /* ── Step labels ── */
    .step-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- Vercel Blob client-upload SDK (loaded as an ES module from esm.sh,
       since this is a static HTML page with no bundler). Exposes the
       upload() function as window.sgBlobUpload for handleVideoUpload. -->
  <script type="module">
    import { upload } from 'https://esm.sh/@vercel/blob@0.27.0/client'
    window.sgBlobUpload = upload
  </script>

  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <a class="back-link" id="backLink" href="/admin/va-queue/">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Queue
      </a>
      <div class="topbar-sep"></div>
      <div class="topbar-title" id="topbarTitle">Loading…</div>
    </div>
    <div class="status-pill status-media_pending" id="statusPill">Media Pending</div>
  </div>

  <div class="editor-wrap">
    <div id="loadingState" class="loading-state">Loading post…</div>
    <div id="editorGrid" class="editor-grid" style="display:none;"></div>
  </div>

  <script>
    // ?secret=… deep-link from Idea Review or VA Queue listing acts as auth.
    // Set the flag so the localStorage gate below passes. Server-side API
    // calls still validate the secret.
    const _sgSecret = new URLSearchParams(location.search).get('secret')
    if (_sgSecret) try { localStorage.setItem('sg_auth', '1') } catch {}

    // Auto-forward ?secret onto every /api/ fetch so the server-side
    // checkAdminAuth() accepts the request without a session cookie.
    if (_sgSecret) {
      const _origFetch = window.fetch
      window.fetch = function(input, init) {
        let url = typeof input === 'string' ? input : (input && input.url) || ''
        if ((url.startsWith('/api/') || url.startsWith(location.origin + '/api/')) && url.indexOf('secret=') === -1) {
          url += (url.indexOf('?') === -1 ? '?' : '&') + 'secret=' + encodeURIComponent(_sgSecret)
          input = typeof input === 'string' ? url : new Request(url, input)
        }
        return _origFetch.call(this, input, init)
      }
    }

    if (!localStorage.getItem('sg_auth')) {
      window.location.href = '/admin/assistant/login.html'
    }

    // Back-to-queue link carries the secret forward
    document.addEventListener('DOMContentLoaded', () => {
      const back = document.getElementById('backLink')
      if (back && _sgSecret) back.href = '/admin/va-queue/?secret=' + encodeURIComponent(_sgSecret)
    })

    const CATEGORY_LABELS = {
      'market-update':'Market Update','investor-tips':'Investor Tips','seller-tips':'Seller Tips',
      'local-happenings':'Local Happenings','trending-topics':'Trending Topics',
      'buying-tips':'Market Update','selling-tips':'Seller Tips','investment':'Investor Tips',
      'community-spotlight':'Local Happenings','local-area':'Local Happenings','news':'Trending Topics',
      'market-insight':'Market Update',
    }

    const slug = new URLSearchParams(location.search).get('slug')
    if (!slug) document.getElementById('loadingState').textContent = 'No slug provided.'

    let currentPost = null
    let pendingImageBase64 = null
    let pendingVideoUrl = null        // Vercel Blob URL after upload
    let heygenPollInterval = null     // polling timer for HeyGen status
    let publishPollTimers = {}        // per-platform Blotato poll timers
    let publishDelay = null           // null = publish now, otherwise hours of delay
    let activeCaptionTab = 'facebook' // which platform tab is shown

    const PLATFORM_TABS = [
      { key: 'facebook',  icon: '📘', label: 'Facebook'  },
      { key: 'linkedin',  icon: '💼', label: 'LinkedIn'  },
      { key: 'twitter',   icon: '𝕏',  label: 'X'         },
      { key: 'threads',   icon: '🧵', label: 'Threads'   },
      { key: 'instagram', icon: '📸', label: 'Instagram' },
      { key: 'youtube',   icon: '▶️', label: 'YouTube'   },
      { key: 'tiktok',    icon: '🎵', label: 'TikTok'    },
    ]
    const PLATFORM_HINTS = {
      facebook:  "Long-form caption for Shana's Facebook page. The blog URL is appended on publish.",
      linkedin:  "Professional take for LinkedIn. A category hashtag and the blog URL are appended on publish.",
      twitter:   "Short caption for X — keep it punchy. The blog URL is appended on publish.",
      threads:   "Conversational caption for Threads. The blog URL is appended on publish.",
      instagram: "Caption for Instagram. Hashtags + the blog URL are appended on publish.",

    async function triggerHeyGen() {
      const script = document.getElementById('scriptArea').value.trim()
      if (!script) {
        document.getElementById('scriptError').innerHTML = `<div class="inline-error">Generate or write a video script first.</div>`
        document.getElementById('scriptArea').scrollIntoView({ behavior: 'smooth', block: 'center' })
        return
      }
      if (heygenPollInterval) clearInterval(heygenPollInterval)
      const panel = document.getElementById('heygenPanel')
      panel.innerHTML = `<div class="panel-info blue"><div class="panel-info-icon">🎬</div><div class="panel-info-body"><div class="panel-info-title">HeyGen is rendering the base video</div><div class="panel-info-sub" id="heygenMsg">Starting render…</div><div class="progress-wrap" style="margin-top:10px;"><div class="progress-bar-bg"><div class="progress-bar-fill" id="heygenBar" style="width:5%;"></div></div></div></div></div>`
      try {
        const r = await fetch('/api/content/generate-heygen-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ script }),
        })
        if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Failed to start video generation')
        const videoId = d.videoId
        let elapsed = 0
        heygenPollInterval = setInterval(async () => {
          elapsed += 15
          const pct = Math.min(90, Math.round((elapsed / 360) * 100))
          const bar = document.getElementById('heygenBar')
          if (bar) bar.style.width = `${pct}%`
          const msg = document.getElementById('heygenMsg')
          const mins = Math.floor(elapsed / 60), secs = elapsed % 60
          if (msg) msg.textContent = `Rendering… ${mins > 0 ? mins + 'm ' : ''}${secs}s`
          try {
            const sr = await fetch(`/api/content/heygen-status?videoId=${encodeURIComponent(videoId)}`)
            const sd = await sr.json()
            if (sd.status === 'completed') {
              clearInterval(heygenPollInterval)
              panel.innerHTML = `<div class="panel-info green"><div class="panel-info-icon">✅</div><div class="panel-info-body"><div class="panel-info-title">Base video rendered</div><div class="panel-info-sub"><a href="${sd.videoUrl}" target="_blank" rel="noopener" style="color:var(--bronze);text-decoration:none;">Download video ↗</a> — edit in HeyGen or a video editor, then upload your final cut in Step 2.</div></div></div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Generate new base video</button>`
            } else if (sd.status === 'failed') {
              clearInterval(heygenPollInterval)
              panel.innerHTML = `<div class="inline-error">HeyGen render failed: ${sd.error || 'Unknown error'}</div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Try again</button>`
            } else if (elapsed >= 600) {
              clearInterval(heygenPollInterval)
              panel.innerHTML = `<div class="inline-error">HeyGen render timed out after 10 minutes.</div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Try again</button>`
            }
          } catch { /* keep polling */ }
        }, 15000)
      } catch (err) {
        panel.innerHTML = `<div class="inline-error">${err.message}</div><button class="gen-btn" style="margin-top:10px;" onclick="resetHeygenPanel()">Try again</button>`
      }
    }

    async function handleVideoUpload(e) {
      const file = e.target.files[0]
      if (!file) return

      const panel = document.getElementById('videoPanel')
      panel.innerHTML = `<div class="progress-wrap"><div class="progress-label"><span>Uploading ${file.name}…</span><span id="videoUploadPct">0%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" id="videoUploadBar" style="width:0%;"></div></div></div>`

      if (!window.sgBlobUpload) {
        panel.innerHTML = `<div class="inline-error">Upload SDK is still loading. Wait a moment and try again.</div>`
        e.target.value = ''
        return
      }

      try {
        // Vercel's client-upload SDK negotiates with /api/content/upload-token
        // (which calls handleUpload) and PUTs the file to the right Blob URL.
        // The window.fetch monkey-patch at the top of this file appends the
        // ?secret URL param to the negotiation call automatically.
        const blob = await window.sgBlobUpload(file.name, file, {
          access: 'public',
          handleUploadUrl: '/api/content/upload-token',
          contentType: file.type || 'video/mp4',
          onUploadProgress: (ev) => {
            const pct = Math.round(ev.percentage || 0)
            const bar = document.getElementById('videoUploadBar')
            const pctEl = document.getElementById('videoUploadPct')
            if (bar) bar.style.width = pct + '%'
            if (pctEl) pctEl.textContent = pct + '%'
          },
        })
        pendingVideoUrl = blob.url
        updatePublishBullet()
        panel.innerHTML = `<div class="panel-info green"><div class="panel-info-icon">🎥</div><div class="panel-info-body"><div class="panel-info-title">Video uploaded</div><div class="panel-info-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${file.name}</div></div><button onclick="clearSavedVideo()" style="font-size:11px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;flex-shrink:0;margin-left:8px;">Remove</button></div>`
      } catch (err) {
        pendingVideoUrl = null
        const sizeMB = (file.size / 1024 / 1024).toFixed(1)
        const mime = file.type || '(none detected)'
        const detail = err && err.message ? err.message : String(err)
        panel.innerHTML = `<div class="inline-error">Upload failed: ${detail}<br><br>File: ${file.name} · ${sizeMB} MB · ${mime}</div><label class="upload-label" style="margin-top:10px;"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Try Again<input class="upload-input" type="file" id="videoInput" accept="video/*" onchange="handleVideoUpload(event)"></label>`
      }
      e.target.value = ''
    }

    function resizeImageToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = (e) => {
          const img = new Image()
          img.onload = () => {
            const canvas = document.createElement('canvas')
            canvas.width = 1280; canvas.height = 720
            const ctx = canvas.getContext('2d')
            const srcAR = img.width / img.height
            const dstAR = 1280 / 720
            let sx = 0, sy = 0, sw = img.width, sh = img.height
            if (srcAR > dstAR) { sw = img.height * dstAR; sx = (img.width - sw) / 2 }
            else { sh = img.width / dstAR; sy = (img.height - sh) / 2 }
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 1280, 720)
            resolve(canvas.toDataURL('image/jpeg', 0.88))
          }
          img.onerror = reject
          img.src = e.target.result
        }
        reader.onerror = reject
        reader.readAsDataURL(file)
      })
    }

    async function republishSocial(mode) {
      if (!currentPost) return
      const btnImage = document.getElementById('republishImageBtn')

      const resultEl = document.getElementById('republishResult')
      const buttons = [btnImage, btnVideo].filter(Boolean)
      buttons.forEach(b => { b.disabled = true })
      const fireBtn = mode === 'video' ? btnVideo : btnImage
      const origText = fireBtn?.textContent
      if (fireBtn) fireBtn.textContent = 'Publishing… (10–30s)'
      if (resultEl) resultEl.innerHTML = `<div class="republish-diag">Submitting to Blotato…</div>`

      try {
        const r = await fetch('/api/blog/republish-social', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: currentPost.slug, mode }),
        })
        const d = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`)

        const env = d.diagnostics?.envStatus || {}
        const envHtml = Object.keys(env)
          .map(k => `<span class="${env[k] ? 'env-ok' : 'env-missing'}">${env[k] ? '✓' : '✗'} ${k}</span>`)
          .join('<br>')

        const platformLabel = {
          facebook: '📘 Facebook',  linkedin: '💼 LinkedIn', twitter: '𝕏 X / Twitter',
          threads:  '🧵 Threads',   instagram: '📸 Instagram',
          facebookReel: '🎬 Facebook Reel', youtube: '▶️ YouTube', tiktok: '🎵 TikTok',
          linkedinVideo: '💼 LinkedIn (video)', twitterVideo: '𝕏 X (video)',
          threadsVideo: '🧵 Threads (video)', instagramReel: '📸 Instagram Reel',
        }
        const results = d.results || {}
        const platformHtml = Object.entries(results)
          .filter(([k]) => !k.startsWith('_'))
          .map(([k, v]) => {
            const label = platformLabel[k] || k
            if (v.ok) return `<span class="env-ok">✓ ${label}: queued (${(v.postSubmissionId || '').slice(0, 16)}…)</span>`
            return `<span class="env-missing">✗ ${label}: ${v.error}</span>`
          })
          .join('<br>')

        const skipped = []
        if (results._imageSkipped) skipped.push(results._imageSkipped)
        if (results._videoSkipped) skipped.push(results._videoSkipped)

        if (resultEl) resultEl.innerHTML = `
          <div class="republish-diag">
            <b>Result</b><br>
            ${platformHtml || '<span class="env-missing">No platforms attempted</span>'}
            ${skipped.length ? '<br><br><b>Skipped</b><br>' + skipped.join('<br>') : ''}
            <br><br>
            <b>Env vars</b><br>
            ${envHtml}
            <br><br>
            <b>Post</b><br>
            slug: ${currentPost.slug}<br>
            heroImageUrl: ${d.diagnostics?.post?.heroImageUrl || '(none)'}<br>
            videoUrl: ${d.diagnostics?.post?.videoUrl || '(none)'}
          </div>
        `
      } catch (err) {
        if (resultEl) resultEl.innerHTML = `<div class="republish-diag"><span class="env-missing">Republish failed: ${err.message}</span></div>`
      } finally {
        buttons.forEach(b => { b.disabled = false })
        if (fireBtn && origText) fireBtn.textContent = origText
      }
    }

                <button class="delay-btn" data-hours="2"  onclick="setPublishDelay(2)">+2h</button>
                <button class="delay-btn" data-hours="4"  onclick="setPublishDelay(4)">+4h</button>
                <button class="delay-btn" data-hours="8"  onclick="setPublishDelay(8)">+8h</button>
                <button class="delay-btn" data-hours="12" onclick="setPublishDelay(12)">+12h</button>
                <button class="delay-btn" data-hours="24" onclick="setPublishDelay(24)">+1 day</button>
                <button class="delay-btn" data-hours="48" onclick="setPublishDelay(48)">+2 days</button>
                <button class="delay-btn" data-hours="72" onclick="setPublishDelay(72)">+3 days</button>
              </div>
              <div class="delay-when" id="delayWhen" style="display:none;"></div>
              <button class="btn-publish" id="publishBtn" ${!isReady ? 'disabled' : ''}>
                Publish
              </button>
            ` : ''}
            <button class="btn-mark-ready" id="markReadyBtn" ${!isPending ? 'disabled' : ''}>
              Mark as Ready
            </button>
            <div class="publish-prereq" id="publishPrereq" ${isReady || isScheduled || isPublished ? 'style="display:none"' : ''}>
              Upload a thumbnail, then click<br>"Mark as Ready" first.
            </div>
            <div id="actionError"></div>
          </div>

          ${isPublished ? `
          <!-- Republish to social — for posts already live on the website -->
          <div class="republish-card">
            <div class="republish-head">
              <span style="font-size:18px;">✓</span>
              <span class="republish-title">Live on the website</span>
            </div>
            <div class="republish-hint">If the social platforms didn't receive the post the first time (Blotato outage, missing env var, etc.), re-fire the social publish without re-touching the blog. The website post stays as is.</div>
            ${post.heroImageUrl ? `
              <button class="btn-republish" id="republishImageBtn" onclick="republishSocial('image')">📸 Republish to image platforms (Facebook · LinkedIn · X · Threads · Instagram)</button>
            ` : `
              <button class="btn-republish" disabled title="Post has no heroImageUrl">📸 Republish to image platforms (no hero image)</button>
            `}
            ${post.videoUrl ? `
              <button class="btn-republish" id="republishVideoBtn" onclick="republishSocial('video')">🎬 Republish to video platforms (YouTube · TikTok · Facebook Reel · LinkedIn · X · Threads · Instagram Reel)</button>
            ` : `
              <button class="btn-republish" disabled title="Post has no videoUrl">🎬 Republish to video platforms (no video uploaded)</button>
            `}
            <div id="republishResult"></div>
          </div>
          ` : ''}

        </div>
      `

      document.getElementById('editorGrid').style.display = 'grid'
      document.getElementById('loadingState').style.display = 'none'

      // Seed caption textarea with active platform value + listen for edits
      const captionEl = document.getElementById('captionArea')
      if (captionEl) {
        captionEl.value = currentCaptions[activeCaptionTab] || ''
        captionEl.addEventListener('input', () => {
          currentCaptions[activeCaptionTab] = captionEl.value
        })
      }

      // File upload
      document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0]
        if (!file) return
        document.getElementById('uploadHint').textContent = 'Resizing…'
        try {
          pendingImageBase64 = await resizeImageToBase64(file)
          document.getElementById('thumbWrap').innerHTML =
            `<img id="thumbImg" src="${pendingImageBase64}" alt="">`
          document.getElementById('uploadHint').textContent = 'New thumbnail ready — click Mark as Ready to save.'
        } catch {
          document.getElementById('uploadHint').textContent = 'Could not process image. Try a different file.'
        }
      })

      updatePublishBullet()

      // Generate all platform captions
      document.getElementById('genBtn').addEventListener('click', async () => {
        const btn = document.getElementById('genBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-muted"></span> Generating all platforms…`
        document.getElementById('genError').innerHTML = ''
        try {
          const r = await fetch('/api/blog/generate-platform-captions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          // d.captions has facebook/youtube/linkedin/twitter/tiktok/threads/instagram
          PLATFORM_TABS.forEach(t => {
            if (d.captions[t.key]) currentCaptions[t.key] = d.captions[t.key]
          })
          const ta = document.getElementById('captionArea')
          if (ta) ta.value = currentCaptions[activeCaptionTab] || ''
        } catch (err) {
          document.getElementById('genError').innerHTML = `<div class="inline-error">${err.message}</div>`
        } finally {
          btn.disabled = false
          btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Generate All Captions`
        }
      })

      // Suggest headlines
      document.getElementById('suggestBtn').addEventListener('click', async () => {
        const btn = document.getElementById('suggestBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-muted"></span> Generating…`
        document.getElementById('suggestError').innerHTML = ''
        document.getElementById('titleSuggestions').style.display = 'none'
        try {
          const r = await fetch('/api/blog/regenerate-title', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          const box = document.getElementById('titleSuggestions')
          box.style.display = 'flex'
          box.innerHTML = d.titles.map((t, i) =>
            `<button class="suggestion-pill" data-idx="${i}" onclick="applyTitle(this,'${t.replace(/'/g, "\\'")}')">${t}</button>`
          ).join('')
        } catch (err) {
          document.getElementById('suggestError').innerHTML =
            `<div class="inline-error" style="margin-top:8px;">${err.message}</div>`
        } finally {
          btn.disabled = false
          btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Suggest Headlines`
        }
      })

      // Generate video script
      document.getElementById('scriptBtn').addEventListener('click', async () => {
        const btn = document.getElementById('scriptBtn')
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-muted"></span> Writing script…`
        document.getElementById('scriptError').innerHTML = ''
        try {
          const r = await fetch('/api/content/generate-script', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: post.title, excerpt: post.excerpt, category: post.category }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          document.getElementById('scriptArea').value = d.script
        } catch (err) {
          document.getElementById('scriptError').innerHTML = `<div class="inline-error">${err.message}</div>`
        } finally {
          btn.disabled = false
          btn.innerHTML = '🎬 Generate Script'
        }
      })

      // Mark as Ready
      document.getElementById('markReadyBtn').addEventListener('click', async () => {
        const btn = document.getElementById('markReadyBtn')
        btn.disabled = true
        btn.textContent = 'Saving…'
        document.getElementById('actionError').innerHTML = ''
        const captions = collectCaptions()
        const body = {
          slug: post.slug,
          socialCopy: captions.facebook || '',
          captions,
          title: document.getElementById('titleInput').value.trim() || post.title,
          videoScript: document.getElementById('scriptArea').value.trim() || undefined,
          videoUrl: pendingVideoUrl || undefined,
        }
        if (pendingImageBase64) body.heroImageBase64 = pendingImageBase64
        try {
          const r = await fetch('/api/blog/queue-mark-ready', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Failed')
          window.location.reload()
        } catch (err) {
          document.getElementById('actionError').innerHTML = `<div class="inline-error">${err.message}</div>`
          btn.disabled = false
          btn.textContent = 'Mark as Ready'
        }
      })

      // Publish (or Schedule, depending on publishDelay)
      const publishBtnEl = document.getElementById('publishBtn')
      if (publishBtnEl) publishBtnEl.addEventListener('click', async () => {
        const btn = document.getElementById('publishBtn')
        const captions = collectCaptions()
        const saveBody = {
          slug: post.slug,
          socialCopy: captions.facebook || '',
          captions,
          title: document.getElementById('titleInput').value.trim() || post.title,
          videoScript: document.getElementById('scriptArea').value.trim() || undefined,
          videoUrl: pendingVideoUrl || undefined,
        }
        if (pendingImageBase64) saveBody.heroImageBase64 = pendingImageBase64
        document.getElementById('actionError').innerHTML = ''

        // ── Schedule path ─────────────────────────────────────────────────
        if (publishDelay && publishDelay > 0) {
          btn.disabled = true
          btn.innerHTML = `<span class="spinner spinner-green"></span> Scheduling…`
          try {
            // Save edits first
            const saveRes = await fetch('/api/blog/queue-mark-ready', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(saveBody),
            })
            if (!saveRes.ok) {
              const sd = await saveRes.json().catch(() => ({}))
              throw new Error(sd.error || 'Failed to save before scheduling')
            }
            const scheduledPublishAt = new Date(Date.now() + publishDelay * 3600 * 1000).toISOString()
            const sr = await fetch('/api/blog/queue-schedule', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                slug: post.slug,
                scheduledPublishAt,
                videoUrl: pendingVideoUrl || undefined,
              }),
            })
            if (sr.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
            const sd = await sr.json()
            if (!sr.ok) throw new Error(sd.error || 'Schedule failed')
            window.location.reload()
          } catch (err) {
            document.getElementById('actionError').innerHTML = `<div class="inline-error">${err.message}</div>`
            btn.disabled = false
            btn.innerHTML = '📅 Schedule'
          }
          return
        }

        // ── Publish-now path ──────────────────────────────────────────────
        btn.disabled = true
        btn.innerHTML = `<span class="spinner spinner-green"></span> Publishing…`

        // Flips true the moment /api/content/publish-video accepts the
        // submission. Used by the catch block to avoid re-enabling Publish
        // (which would double-fire the social blast on retry).
        let socialSubmittedSuccessfully = false

        try {
          // 1. Save edits to the post first (captions, title, script, video URL, etc.)
          const saveRes = await fetch('/api/blog/queue-mark-ready', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(saveBody),
          })
          if (!saveRes.ok && saveRes.status !== 200) {
            const sd = await saveRes.json().catch(() => ({}))
            throw new Error(sd.error || 'Failed to save before publishing')
          }

          // ── No video: publish blog immediately (legacy fast path) ─────────
          if (!pendingVideoUrl) {
            const r = await fetch('/api/blog/queue-publish', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ slug: post.slug }),
            })
            if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
            const d = await r.json()
            if (!r.ok) throw new Error(d.error || 'Publish failed')
            window.location.href = '/admin/va-queue/?published=1' + (_sgSecret ? '&secret=' + encodeURIComponent(_sgSecret) : '')
            return
          }

          // ── Video path: OneUp posts to social FIRST; we then wait for
          //                YouTube to appear on Shana's channel via RSS,
          //                capture the watch URL, then publish the blog
          //                so the page renders with the embed in place.
          btn.innerHTML = `<span class="spinner spinner-green"></span> Publishing to social…`
          document.getElementById('publishBullets').style.display = 'none'
          const pStatus = document.getElementById('platformStatus')
          pStatus.style.display = 'flex'
          // Shana's "Shana Gates" OneUp category is wired to YouTube,
          // Instagram, TikTok, and Facebook only — no Google Business Profile.
          // OneUp doesn't surface per-platform submission status, so the
          // non-YouTube rows are informational only ("Submitted").
          pStatus.innerHTML = `
            <div class="platform-row"><span class="platform-icon">▶️</span><span class="platform-name">YouTube (gates blog publish)</span><span class="platform-status pstatus-polling" id="ps-youtube">Submitting…</span></div>
            <div class="platform-row"><span class="platform-icon">📸</span><span class="platform-name">Instagram</span><span class="platform-status pstatus-polling" id="ps-instagram">Submitting…</span></div>
            <div class="platform-row"><span class="platform-icon">🎵</span><span class="platform-name">TikTok</span><span class="platform-status pstatus-polling" id="ps-tiktok">Submitting…</span></div>
            <div class="platform-row"><span class="platform-icon">🎬</span><span class="platform-name">Facebook</span><span class="platform-status pstatus-polling" id="ps-facebook">Submitting…</span></div>
            <div class="platform-row"><span class="platform-icon">🌐</span><span class="platform-name">Website</span><span class="platform-status pstatus-idle" id="ps-website">Waiting on YouTube…</span></div>
          `

          // Single OneUp call submits to all 4 connected accounts in the
          // category at once. Response includes the `since` timestamp the
          // server captured BEFORE submission — we hand that to the
          // YouTube RSS poller as the cutoff.
          const vr = await fetch('/api/content/publish-video', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug, videoUrl: pendingVideoUrl }),
          })
          const vd = await vr.json()
          if (!vr.ok || !vd.ok) throw new Error(vd.error || 'OneUp submission failed')
          // Flag set: if anything below this point fails, the catch block
          // must NOT re-enable Publish (would double-fire the social blast).
          // The server-side guard (post.socialPublishedAt) catches duplicates
          // anyway, but we harden the UI here too.
          // If alreadyPublished is true, we're resuming after a previous
          // partial failure — same lockout applies (don't re-submit).
          socialSubmittedSuccessfully = true
          if (vd.alreadyPublished) {
            document.getElementById('actionError').innerHTML =
              '<div class="inline-banner">Social was already submitted at ' + vd.socialPublishedAt + ' — resuming blog publish without re-firing OneUp.</div>'
          }

          // Mark IG/TT/FB as "Submitted" — OneUp doesn't expose per-platform
          // confirmation, but the submission succeeded so we can trust it'll
          // post within a few minutes.
          ;['instagram', 'tiktok', 'facebook'].forEach(platform => {
            const el = document.getElementById(`ps-${platform}`)
            if (el) { el.textContent = 'Submitted via OneUp'; el.className = 'platform-status pstatus-idle' }
          })

          // YouTube: gates the blog publish. Poll Shana's channel RSS
          // every 10 s for up to 15 min (90 attempts). RSS typically reflects
          // new uploads within 1–10 min — earlier 5-min cap was timing out
          // on slow days, leaving the blog stuck at media_ready even though
          // YouTube had successfully published. When found, the server-side
          // youtube-wait endpoint also persists post.youtubeUrl so the
          // blog page renders the embed immediately on first load.
          const ytEl = document.getElementById('ps-youtube')
          if (ytEl) { ytEl.textContent = 'Publishing…'; ytEl.className = 'platform-status pstatus-polling' }
          const since = vd.since

          await new Promise((resolve, reject) => {
            let attempts = 0
            const timer = setInterval(async () => {
              attempts++
              try {
                const qs = new URLSearchParams({ slug: post.slug, since })
                const sr = await fetch(`/api/content/youtube-wait?${qs}`)
                const sd = await sr.json()
                if (sd.found) {
                  clearInterval(timer); delete publishPollTimers['youtube']
                  if (ytEl) { ytEl.textContent = 'Published'; ytEl.className = 'platform-status pstatus-done' }
                  resolve(sd)
                } else if (attempts >= 90) {
                  clearInterval(timer); delete publishPollTimers['youtube']
                  if (ytEl) { ytEl.textContent = 'Not detected yet'; ytEl.className = 'platform-status pstatus-error' }
                  reject(new Error('YouTube channel RSS did not show a new video within 15 minutes. Try again or refresh later.'))
                }
              } catch { /* network blip — keep polling */ }
            }, 10000)
            publishPollTimers['youtube'] = timer
          })

          // YouTube is live and the watch URL is persisted on the post record.
          // Now publish the blog — the page will render with the embed already.
          btn.innerHTML = `<span class="spinner spinner-green"></span> Publishing blog…`
          const wEl = document.getElementById('ps-website')
          if (wEl) { wEl.textContent = 'Publishing…'; wEl.className = 'platform-status pstatus-polling' }

          const r = await fetch('/api/blog/queue-publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: post.slug }),
          })
          if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
          const d = await r.json()
          if (!r.ok) throw new Error(d.error || 'Blog publish failed')

          if (wEl) { wEl.textContent = 'Live'; wEl.className = 'platform-status pstatus-done' }
          btn.disabled = false
          btn.innerHTML = '✓ Published'
          btn.style.opacity = '0.5'
        } catch (err) {
          document.getElementById('actionError').innerHTML = `<div class="inline-error">${err.message}</div>`
          // CRITICAL: do NOT re-enable the Publish button if OneUp already
          // accepted the social submission. Re-clicking Publish would call
          // /api/content/publish-video again, which double-posts to TT/YT/FB.
          // (Server-side socialPublishedAt guard now blocks the double-submit
          // even if this UI lockout fails, but we harden both layers.)
          if (socialSubmittedSuccessfully) {
            btn.innerHTML = '⚠ Social posted — refresh to retry blog only'
            btn.style.opacity = '0.5'
            btn.disabled = true
          } else {
            btn.disabled = false
            btn.innerHTML = 'Publish'
          }
        }
      })
    }

    function copyPrompt() {
      const text = document.getElementById('promptArea').value
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn')
        btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`
        setTimeout(() => {
          btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Prompt`
        }, 2000)
      })
    }

    function applyTitle(btn, title) {
      document.getElementById('titleInput').value = title
      document.querySelectorAll('.suggestion-pill').forEach(p => p.classList.remove('applied'))
      btn.classList.add('applied')
    }

    async function loadPost() {
      if (!slug) return
      try {
        const r = await fetch(`/api/blog/queue-post?slug=${encodeURIComponent(slug)}`)
        if (r.status === 401) { window.location.href = '/admin/assistant/login.html'; return }
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Not found')
        render(d.post)
      } catch (err) {
        document.getElementById('loadingState').innerHTML =
          `<div style="color:var(--muted);font-size:14px;"><strong style="color:var(--text);display:block;margin-bottom:6px;">Error loading post</strong>${err.message}</div>`
      }
    }

    loadPost()
  </script>
  <script src="/admin/admin-nav.js" defer></script>
</body>
</html>
