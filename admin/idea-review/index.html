<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/favcon.png" />
  <title>Idea Review — Shana Gates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bronze: #C8C8C8;
      --bronze-dim: rgba(200,200,200,0.15);
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: rgba(255,255,255,0.45);
      --font: system-ui, -apple-system, sans-serif;
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #22c55e;
      --blue: #3b82f6;
      --purple: #a855f7;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .header-left {}
    .header-brand { color: var(--bronze); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { color: var(--text); font-size: 18px; font-weight: 700; }
    .header-meta { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .header-nav { display: flex; gap: 12px; align-items: center; }
    .nav-link { color: var(--muted); font-size: 13px; text-decoration: none; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); transition: color 0.15s, border-color 0.15s; }
    .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-generate {
      background: var(--bronze); color: #000; border: 1px solid var(--bronze);
      font-size: 13px; font-weight: 700; padding: 7px 14px; border-radius: 7px;
      cursor: pointer; font-family: var(--font);
      display: inline-flex; align-items: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .btn-generate:hover:not(:disabled) { opacity: 0.85; }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Source pill on cards */
    .source-pill {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
    }
    .source-pill.news { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
    .source-pill.idea { background: rgba(200,200,200,0.12); color: var(--bronze); border: 1px solid var(--bronze-dim); }
    .news-link { font-size: 11px; color: var(--bronze); text-decoration: none; margin-left: 6px; }
    .news-link:hover { text-decoration: underline; }

    /* Progress overlay for Generate Ideas */
    .gen-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 9998;
    }
    .gen-overlay.visible { display: flex; }
    .gen-overlay-inner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 32px 40px; text-align: center; max-width: 380px;
    }
    .gen-overlay-inner .spinner { width: 36px; height: 36px; margin-bottom: 18px; }
    .gen-overlay-inner h3 { font-size: 16px; margin-bottom: 8px; }
    .gen-overlay-inner p  { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* ── Layout: sidebar + content ── */
    .layout {
      max-width: 1240px; margin: 0 auto; padding: 28px 24px 80px;
      display: grid; grid-template-columns: 240px 1fr; gap: 32px;
      align-items: start;
    }
    .sidebar {
      position: sticky; top: 24px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 14px; max-height: calc(100vh - 48px); overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 18px; }
    .sidebar-section:last-child { margin-bottom: 0; }
    .sidebar-heading {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); padding: 0 8px 10px; margin-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      width: 100%; background: none; border: 1px solid transparent;
      color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
      padding: 7px 12px; border-radius: 8px; cursor: pointer;
      transition: all 0.15s; text-align: left;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      margin-bottom: 2px; font-family: var(--font);
    }
    .filter-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .filter-btn.active {
      background: rgba(200,200,200,0.10); border-color: var(--bronze-dim); color: var(--bronze); font-weight: 600;
    }
    .filter-count {
      font-size: 11px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55);
      padding: 1px 7px; border-radius: 10px; min-width: 22px; text-align: center;
    }
    .filter-btn.active .filter-count {
      background: rgba(200,200,200,0.18); color: var(--bronze);
    }
    main { min-width: 0; }

    /* Mobile: sidebar collapses to horizontal scroll above the list */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; gap: 18px; padding: 18px 16px 60px; }
      .sidebar { position: static; max-height: none; padding: 14px; }
      .sidebar-section { margin-bottom: 14px; }
      .sidebar-section-cats { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .sidebar-section-cats::-webkit-scrollbar { display: none; }
      .sidebar-section-cats .filter-btn { flex-shrink: 0; width: auto; }
      .sidebar-section-cats .sidebar-heading { display: none; }
      .sidebar-section-status { display: flex; gap: 6px; flex-wrap: wrap; }
      .sidebar-section-status .sidebar-heading { width: 100%; padding-bottom: 6px; margin-bottom: 6px; }
      .sidebar-section-status .filter-btn { flex: 1; min-width: 0; width: auto; }
    }

    /* ── Empty / loading ── */
    .state-msg { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 15px; }
    .state-msg .icon { font-size: 40px; margin-bottom: 16px; }
    .state-msg strong { display: block; color: var(--text); font-size: 17px; margin-bottom: 8px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--bronze); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Idea card ── */
    .idea-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .idea-card.status-approved { border-color: rgba(34,197,94,0.35); }
    .idea-card.status-skipped  { opacity: 0.45; }
    .idea-card.status-deferred { border-color: rgba(249,115,22,0.25); }

    .card-top { display: flex; gap: 16px; align-items: flex-start; }

    /* Score ring */
    .score-ring {
      flex-shrink: 0;
      width: 52px;
      text-align: center;
    }
    .score-num { font-size: 22px; font-weight: 800; line-height: 1; }
    .score-denom { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }
    .score-ring.top-pick .score-num { color: var(--bronze); }
    .score-ring.good .score-num { color: #22c55e; }
    .score-ring.ok .score-num { color: var(--muted); }

    .card-body { flex: 1; min-width: 0; }

    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .badge-top-pick { background: rgba(200,200,200,0.2); color: var(--bronze); }
    .badge-market-update         { background: rgba(37,99,235,0.2);   color: #60a5fa; }
    .badge-investor-tips,
    .badge-investment            { background: rgba(255,152,0,0.2);   color: #fbbf24; }
    .badge-seller-tips,
    .badge-selling-tips          { background: rgba(14,165,233,0.2);  color: #38bdf8; }
    .badge-buying-tips           { background: rgba(20,184,166,0.2);  color: #5eead4; }
    .badge-community,
    .badge-community-spotlight   { background: rgba(168,85,247,0.2);  color: #c084fc; }
    .badge-community-development { background: rgba(217,70,239,0.2);  color: #e879f9; }
    .badge-trending-topics,
    .badge-news                  { background: rgba(225,29,72,0.2);   color: #fb7185; }
    .badge-local-interest        { background: rgba(132,204,22,0.2);  color: #a3e635; }
    .badge-home-ownership        { background: rgba(245,158,11,0.2);  color: #fcd34d; }
    .badge-events                { background: rgba(244,114,182,0.2); color: #f9a8d4; }
    .badge-breaking  { background: rgba(239,68,68,0.2);  color: #f87171; }
    .badge-timely    { background: rgba(245,158,11,0.2); color: #fcd34d; }
    .badge-evergreen { background: rgba(107,114,128,0.2);color: #9ca3af; }

    .card-title { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 6px; }
    .card-angle { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }

    .card-sources { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .source-label { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; }

    /* Score breakdown */
    .score-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-bottom: 14px; }
    .score-bar-row { display: flex; align-items: center; gap: 6px; }
    .score-bar-label { font-size: 11px; color: var(--muted); width: 88px; flex-shrink: 0; }
    .score-bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; background: var(--bronze); transition: width 0.3s; }
    .score-bar-val { font-size: 10px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }

    /* Actions */
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn { font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-approve { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: #4ade80; }
    .btn-approve:hover:not(:disabled) { background: rgba(34,197,94,0.2); }
    .btn-skip   { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #f87171; }
    .btn-skip:hover:not(:disabled) { background: rgba(239,68,68,0.18); }
    .btn-defer  { background: rgba(249,115,22,0.1); border-color: rgba(249,115,22,0.25); color: #fb923c; }
    .btn-defer:hover:not(:disabled) { background: rgba(249,115,22,0.18); }
    .btn-write  { background: var(--bronze); color: #000; border-color: var(--bronze); }
    .btn-write:hover:not(:disabled) { background: #c9a96a; }
    .btn-undo   { background: none; border-color: var(--border); color: var(--muted); font-size: 12px; padding: 6px 12px; }
    .btn-undo:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .status-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
    .status-pill.approved { background: rgba(34,197,94,0.15); color: #4ade80; }
    .status-pill.skipped  { background: rgba(239,68,68,0.1);  color: #f87171; }
    .status-pill.deferred { background: rgba(249,115,22,0.1); color: #fb923c; }

    .write-result { font-size: 13px; color: #4ade80; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); border-radius: 8px; padding: 8px 14px; margin-top: 10px; }
    .write-result a { color: var(--bronze); text-decoration: none; }
    .write-result a:hover { text-decoration: underline; }
    .write-error { font-size: 13px; color: #f87171; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 8px 14px; margin-top: 10px; }
    .fh-warning { font-size: 12px; color: #fcd34d; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); border-radius: 6px; padding: 6px 12px; margin-top: 8px; }

    /* Toast */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; padding: 12px 22px; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-brand">Shana Gates · Craft &amp; Bauer</div>
    <div class="header-title">Idea Review</div>
    <div class="header-meta" id="header-meta">Loading ideas…</div>
  </div>
  <nav class="header-nav">
    <button class="btn-generate" id="generateBtn" onclick="generateIdeas()">
      ✦ Generate Ideas
    </button>
    <a href="/admin/assistant/" class="nav-link">Assistant</a>
  </nav>
</header>

<div class="gen-overlay" id="genOverlay">
  <div class="gen-overlay-inner">
    <div class="spinner"></div>
    <h3 id="genTitle">Researching Coachella Valley news…</h3>
    <p id="genSubtitle">Tavily search → Claude scoring. Usually 30–60 seconds.</p>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section sidebar-section-status">
      <div class="sidebar-heading">Status</div>
      <button class="filter-btn active" data-filter="pending" onclick="setFilter('pending')">
        <span>Pending</span><span class="filter-count" id="count-pending">0</span>
      </button>
      <button class="filter-btn" data-filter="approved" onclick="setFilter('approved')">
        <span>Approved</span><span class="filter-count" id="count-approved">0</span>
      </button>
      <button class="filter-btn" data-filter="all" onclick="setFilter('all')">
        <span>All</span><span class="filter-count" id="count-all">0</span>
      </button>
    </div>
    <div class="sidebar-section sidebar-section-cats" id="sidebar-categories">
      <div class="sidebar-heading">Categories</div>
      <!-- populated by JS -->
    </div>
  </aside>

  <main id="main">
    <div class="state-msg">
      <div class="spinner"></div>
      <div>Loading ideas…</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const secret = new URLSearchParams(location.search).get('secret') || ''
  const apiBase = secret ? `/api/content/ideas?secret=${encodeURIComponent(secret)}` : '/api/content/ideas'

  let allIdeas = []           // unified list — entries tagged with _source ('idea' or 'article')
  let currentDate = ''        // date string for the loaded articles batch
  let currentFilter = 'pending'
  let currentCategory = 'all'

  // ── Canonical categories (sidebar order) ─────────────────────────────────
  const CATEGORIES = [
    { slug: 'community-spotlight',   label: 'Community Spotlight' },
    { slug: 'community-development', label: 'Community Development' },
    { slug: 'news',                  label: 'News' },
    { slug: 'market-update',         label: 'Market Update' },
    { slug: 'buying-tips',           label: 'Buying Tips' },
    { slug: 'selling-tips',          label: 'Selling Tips' },
    { slug: 'local-interest',        label: 'Local Interest' },
    { slug: 'investment',            label: 'Investment' },
    { slug: 'home-ownership',        label: 'Home Ownership' },
    { slug: 'events',                label: 'Events' },
  ]

  // Map legacy / writer-emitted category slugs onto the 10 canonical ones
  const CATEGORY_ALIASES = {
    'market-insight':       'market-update',
    'market-updates':       'market-update',
    'investor-tips':        'investment',
    'investments':          'investment',
    'seller-tips':          'selling-tips',
    'sellers':              'selling-tips',
    'buyers':               'buying-tips',
    'buying':               'buying-tips',
    'community':            'community-spotlight',
    'community-spotlights': 'community-spotlight',
    'local-happenings':     'community-spotlight',
    'lifestyle':            'community-spotlight',
    'local-area':           'community-spotlight',
    'trending-topics':      'news',
    'trending':             'news',
    'local-history':        'local-interest',
    'history':              'local-interest',
    'event':                'events',
    'home-owner':           'home-ownership',
    'homeowner':            'home-ownership',
  }
  function canonicalCategory(raw) {
    const key = (raw || '').toLowerCase().trim()
    if (!key) return 'community-spotlight'
    if (CATEGORIES.some(c => c.slug === key)) return key
    return CATEGORY_ALIASES[key] || 'community-spotlight'
  }
  function categoryLabel(slug) {
    const c = CATEGORIES.find(c => c.slug === slug)
    return c ? c.label : slug.replace(/-/g, ' ')
  }

  // Article local status lives in localStorage (server has no per-article status)
  function articleStatusMap() {
    try { return JSON.parse(localStorage.getItem('sg_article_status') || '{}') }
    catch { return {} }
  }
  function setArticleStatus(id, status) {
    const m = articleStatusMap()
    if (status === 'pending') delete m[id]
    else m[id] = status
    localStorage.setItem('sg_article_status', JSON.stringify(m))
  }

  // Derive urgency for a news article from how recent it is
  function urgencyFromDate(iso) {
    const ts = Date.parse(iso || '')
    if (isNaN(ts)) return 'evergreen'
    const ageDays = (Date.now() - ts) / (1000 * 60 * 60 * 24)
    if (ageDays < 1.5) return 'breaking'
    if (ageDays < 7)   return 'timely'
    return 'evergreen'
  }

  // Map ScoredArticle → idea-shaped card record
  function articleToCard(a, statuses) {
    return {
      _source: 'article',
      id: `article:${a.id}`,
      rawId: a.id,
      title: a.title,
      angle: a.whyItMatters || a.summary || '',
      summary: a.summary || '',
      category: a.category,
      _category: canonicalCategory(a.category),
      urgency: urgencyFromDate(a.publishedDate),
      sourceLabels: [a.source].filter(Boolean),
      sourceUrl: a.url,
      score: { total: typeof a.score === 'number' ? Math.round(a.score) : 0 },
      status: statuses[a.id] || 'pending',
    }
  }

  // Ensure every idea has _source: 'idea' + canonical category
  function tagIdea(i) {
    return { ...i, _source: 'idea', _category: canonicalCategory(i.category) }
  }

  // ── Fetch ────────────────────────────────────────────────────────────────────
  async function loadIdeas() {
    try {
      const ideasUrl    = apiBase + (secret ? '&filter=all' : '?filter=all')
      const articlesUrl = '/api/blog/articles'
      const [ideasRes, articlesRes] = await Promise.all([
        fetch(ideasUrl),
        fetch(articlesUrl).catch(() => null),
      ])

      if (ideasRes.status === 401) {
        document.getElementById('main').innerHTML = `<div class="state-msg"><div class="icon">🔒</div><strong>Not authorized</strong>Open this page from the link in your email digest.</div>`
        return
      }

      const ideaData = ideasRes.ok ? await ideasRes.json() : { ideas: [] }
      const articleData = articlesRes && articlesRes.ok ? await articlesRes.json() : { articles: [], date: '' }
      currentDate = articleData.date || ''
      const statuses = articleStatusMap()

      const ideas    = (ideaData.ideas || []).map(tagIdea)
      const articles = (articleData.articles || []).map(a => articleToCard(a, statuses))

      // Newest / highest-scoring first across both sources
      allIdeas = [...articles, ...ideas].sort((a, b) => (b.score?.total || 0) - (a.score?.total || 0))

      updateCounts()
      renderIdeas()
    } catch {
      document.getElementById('main').innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><strong>Failed to load</strong>Check your connection and reload.</div>`
    }
  }

  // ── Generate Ideas: re-run today's research ────────────────────────────────
  function showGenError(headline, detail) {
    const overlay = document.getElementById('genOverlay')
    const inner = overlay.querySelector('.gen-overlay-inner')
    inner.innerHTML = `
      <div style="font-size:38px;margin-bottom:12px;">⚠️</div>
      <h3 style="font-size:16px;margin-bottom:8px;color:#f87171;">${escHtml(headline)}</h3>
      <p style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;white-space:pre-wrap;text-align:left;background:rgba(0,0,0,0.3);padding:10px 12px;border-radius:6px;border:1px solid rgba(239,68,68,0.2);font-family:'Courier New',monospace;font-size:11px;color:#fca5a5;">${escHtml(detail)}</p>
      <button onclick="document.getElementById('genOverlay').classList.remove('visible')" style="background:var(--bronze);color:#000;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;">Close</button>
    `
  }

  async function generateIdeas() {
    const btn = document.getElementById('generateBtn')
    const overlay = document.getElementById('genOverlay')
    btn.disabled = true
    btn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px;border-color:rgba(0,0,0,0.25);border-top-color:#000;display:inline-block;vertical-align:middle;margin-right:6px;"></span> Researching…'
    overlay.classList.add('visible')
    overlay.querySelector('.gen-overlay-inner').innerHTML = `
      <div class="spinner"></div>
      <h3 id="genTitle">Researching Coachella Valley news…</h3>
      <p id="genSubtitle">Tavily search → Claude scoring. Usually 30–60 seconds.</p>
    `
    try {
      const url = '/api/blog/run-research?type=daily' + (secret ? `&secret=${encodeURIComponent(secret)}` : '')
      const res = await fetch(url, { method: 'POST' })
      if (res.status === 401) {
        showGenError(
          'Not authorized',
          secret
            ? 'The ?secret= in the URL does not match ADMIN_SECRET. Check the link from your email digest.'
            : 'No session cookie and no ?secret= in the URL. Sign in at /admin/assistant/login.html and try again.'
        )
        return
      }
      const rawText = await res.text()
      let data = {}
      try { data = JSON.parse(rawText) } catch { /* HTML error page from Vercel */ }
      if (!res.ok) {
        const phaseLabel = data.phase ? ` [${data.phase}]` : ''
        const detail = (data.error || rawText.slice(0, 800) || `HTTP ${res.status}`) +
          (data.stack ? `\n\n--- stack ---\n${data.stack.slice(0, 800)}` : '')
        console.error('[generateIdeas] server returned', res.status, rawText)
        showGenError(`Research failed (HTTP ${res.status})${phaseLabel}`, detail)
        return
      }
      overlay.classList.remove('visible')
      await loadIdeas()
      showToast(`✓ Generated ${data.count || 0} fresh articles + ideas`)
    } catch (err) {
      console.error('[generateIdeas]', err)
      showGenError('Research failed (network)', err && err.message ? err.message : String(err))
    } finally {
      btn.disabled = false
      btn.innerHTML = '✦ Generate Ideas'
    }
  }

  function ideasMatchingStatus() {
    if (currentFilter === 'all') return allIdeas
    if (currentFilter === 'approved') return allIdeas.filter(i => i.status === 'approved')
    return allIdeas.filter(i => i.status === 'pending')
  }

  function updateCounts() {
    // Status counts respect ALL ideas (so swapping status doesn't hide the option)
    document.getElementById('count-pending').textContent  = allIdeas.filter(i => i.status === 'pending').length
    document.getElementById('count-approved').textContent = allIdeas.filter(i => i.status === 'approved').length
    document.getElementById('count-all').textContent      = allIdeas.length

    // Category counts respect the current status filter — shows what's available
    // to review under the active status
    const inStatus = ideasMatchingStatus()
    const catCount = (slug) => inStatus.filter(i => i._category === slug).length
    document.querySelectorAll('[data-cat]').forEach(btn => {
      const slug = btn.dataset.cat
      const countEl = btn.querySelector('.filter-count')
      if (countEl) countEl.textContent = slug === 'all' ? inStatus.length : catCount(slug)
    })

    const pending = allIdeas.filter(i => i.status === 'pending').length
    const articles = allIdeas.filter(i => i._source === 'article').length
    const ideas = allIdeas.length - articles
    document.getElementById('header-meta').textContent =
      `${pending} pending · ${articles} news article${articles !== 1 ? 's' : ''} + ${ideas} scored idea${ideas !== 1 ? 's' : ''}`
  }

  function renderSidebarCategories() {
    const wrap = document.getElementById('sidebar-categories')
    if (!wrap) return
    const items = [{ slug: 'all', label: 'All Categories' }, ...CATEGORIES]
    wrap.innerHTML = '<div class="sidebar-heading">Categories</div>' +
      items.map(c => `
        <button class="filter-btn ${c.slug === currentCategory ? 'active' : ''}"
                data-cat="${c.slug}" onclick="setCategory('${c.slug}')">
          <span>${c.label}</span>
          <span class="filter-count">0</span>
        </button>
      `).join('')
  }

  function setFilter(f) {
    currentFilter = f
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === f))
    updateCounts() // recompute category counts under the new status
    renderIdeas()
  }

  function setCategory(slug) {
    currentCategory = slug
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === slug))
    renderIdeas()
  }

  // ── Render ────────────────────────────────────────────────────────────────────
  function renderIdeas() {
    const main = document.getElementById('main')
    let filtered = ideasMatchingStatus()
    if (currentCategory !== 'all') {
      filtered = filtered.filter(i => i._category === currentCategory)
    }

    if (filtered.length === 0) {
      // Category-specific empty state takes priority
      if (currentCategory !== 'all') {
        const label = categoryLabel(currentCategory)
        const statusWord = currentFilter === 'approved' ? 'approved'
                         : currentFilter === 'pending'  ? 'pending'
                         : ''
        const body = statusWord
          ? `Nothing ${statusWord} in ${label} right now. Try a different category, or click ✦ Generate Ideas to pull fresh research.`
          : `No ${label} items yet. Click ✦ Generate Ideas to pull fresh research.`
        main.innerHTML = `<div class="state-msg"><div class="icon">📂</div><strong>No ${label}</strong>${body}</div>`
        return
      }
      const msgs = {
        pending:  { icon: '✅', title: 'All caught up!', body: 'Nothing pending. Click ✦ Generate Ideas to pull fresh Coachella Valley news and scored ideas.' },
        approved: { icon: '📝', title: 'None approved yet', body: 'Approve from the Pending tab to see them here.' },
        all:      { icon: '💡', title: 'No content yet', body: 'Click ✦ Generate Ideas to research today\'s Coachella Valley news, or wait for the daily 6 AM cron.' },
      }
      const m = msgs[currentFilter] || msgs.all
      main.innerHTML = `<div class="state-msg"><div class="icon">${m.icon}</div><strong>${m.title}</strong>${m.body}</div>`
      return
    }

    main.innerHTML = filtered.map(idea => renderCard(idea)).join('')
  }

  function scoreClass(total) {
    if (total >= 75) return 'top-pick'
    if (total >= 55) return 'good'
    return 'ok'
  }

  function catBadgeClass(cat) {
    return 'badge badge-' + (cat || 'community-spotlight')
  }

  function renderScoreBars(score) {
    const dims = [
      { label: 'Local Focus',  val: score.localRelevance,    max: 25 },
      { label: 'Timeliness',   val: score.timeliness,         max: 20 },
      { label: 'Format Fit',   val: score.formatFit,          max: 15 },
      { label: 'Audience',     val: score.audienceValue,       max: 15 },
      { label: 'Credibility',  val: score.sourceCredibility,  max: 10 },
      { label: 'Novelty',      val: score.novelty,            max: 10 },
    ]
    return `<div class="score-bars">${dims.map(d => `
      <div class="score-bar-row">
        <div class="score-bar-label">${d.label}</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${Math.round(d.val / d.max * 100)}%"></div></div>
        <div class="score-bar-val">${d.val}</div>
      </div>`).join('')}</div>`
  }

  function renderActions(idea) {
    if (idea.status === 'pending') {
      return `
        <button class="btn btn-write" id="write-btn-${idea.id}" onclick="writePost('${idea.id}')">✓ Approve &amp; Write →</button>
        <button class="btn btn-skip"  onclick="setStatus('${idea.id}', 'skipped')">✗ Skip</button>
        <button class="btn btn-defer" onclick="setStatus('${idea.id}', 'deferred')">⏸ Defer</button>`
    }
    if (idea.status === 'approved') {
      // Legacy state — items approved before single-click flow. Keep the write button here.
      return `
        <span class="status-pill approved">Approved</span>
        <button class="btn btn-write" id="write-btn-${idea.id}" onclick="writePost('${idea.id}')">Write &amp; Publish →</button>
        <button class="btn btn-undo" onclick="setStatus('${idea.id}', 'pending')">Undo</button>`
    }
    if (idea.status === 'skipped') {
      return `<span class="status-pill skipped">Skipped</span><button class="btn btn-undo" onclick="setStatus('${idea.id}', 'pending')">Undo</button>`
    }
    if (idea.status === 'deferred') {
      return `<span class="status-pill deferred">Deferred</span><button class="btn btn-write" id="write-btn-${idea.id}" onclick="writePost('${idea.id}')">Approve &amp; Write →</button><button class="btn btn-undo" onclick="setStatus('${idea.id}', 'pending')">Undo</button>`
    }
    return ''
  }

  function renderCard(idea) {
    const isTopPick = idea.score.total >= 75
    const isArticle = idea._source === 'article'
    const sourcePill = `<span class="source-pill ${isArticle ? 'news' : 'idea'}">${isArticle ? '📰 News' : '💡 Idea'}</span>`
    const sourceLinks = (idea.sourceLabels || [])
      .map(l => `<span class="source-label">${escHtml(l)}</span>`)
      .join('')
    const externalLink = isArticle && idea.sourceUrl
      ? `<a class="news-link" href="${escHtml(idea.sourceUrl)}" target="_blank" rel="noopener">View source ↗</a>`
      : ''
    return `
    <div class="idea-card status-${idea.status}" id="card-${idea.id}">
      <div class="card-top">
        <div class="score-ring ${scoreClass(idea.score.total)}">
          <div class="score-num">${idea.score.total}</div>
          <div class="score-denom">/ 100</div>
        </div>
        <div class="card-body">
          <div class="card-badges">
            ${sourcePill}
            ${isTopPick ? '<span class="badge badge-top-pick">★ Top Pick</span>' : ''}
            <span class="${catBadgeClass(idea._category)}">${categoryLabel(idea._category)}</span>
            <span class="badge badge-${idea.urgency}">${idea.urgency}</span>
          </div>
          <div class="card-title">${escHtml(idea.title)}</div>
          <div class="card-angle">${escHtml(idea.angle)}</div>
          <div class="card-sources">${sourceLinks}${externalLink}</div>
          ${isArticle ? '' : renderScoreBars(idea.score)}
          <div class="card-actions" id="actions-${idea.id}">${renderActions(idea)}</div>
          <div id="result-${idea.id}"></div>
        </div>
      </div>
    </div>`
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  async function setStatus(id, status) {
    const idea = allIdeas.find(i => i.id === id)
    if (idea) { idea.status = status; updateCounts(); renderIdeas() }

    // Articles: persist locally only (server has no idea-style status for raw articles)
    if (idea && idea._source === 'article') {
      setArticleStatus(idea.rawId, status)
      const labels = { approved: 'Approved ✓', skipped: 'Skipped', deferred: 'Deferred', pending: 'Reset to pending' }
      showToast(labels[status] || status)
      return
    }

    try {
      const res = await fetch(secret ? `/api/content/ideas?secret=${encodeURIComponent(secret)}` : '/api/content/ideas', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status }),
      })
      if (!res.ok) throw new Error('Server error')
      const labels = { approved: 'Approved ✓', skipped: 'Skipped', deferred: 'Deferred', pending: 'Reset to pending' }
      showToast(labels[status] || status)
    } catch {
      showToast('Failed to update — reload and try again', true)
      await loadIdeas() // revert
    }
  }

  async function writePost(id) {
    const idea = allIdeas.find(i => i.id === id)
    const btn = document.getElementById(`write-btn-${id}`)
    const resultEl = document.getElementById(`result-${id}`)
    if (btn) { btn.disabled = true; btn.textContent = 'Writing post… (30–60s)' }
    if (resultEl) resultEl.innerHTML = `<div class="write-result" style="background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.25);color:#93c5fd;">Writing post and generating hero image… this takes 30–60 seconds. Don't close this tab.</div>`

    try {
      let res, data
      if (idea && idea._source === 'article') {
        // News article path: write a single post via the batch publish endpoint
        const publishUrl = '/api/blog/publish' + (secret ? `?secret=${encodeURIComponent(secret)}` : '')
        res = await fetch(publishUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: currentDate, articleIds: [idea.rawId] }),
        })
        data = await res.json().catch(() => ({}))
        if (!res.ok) throw new Error(data.error || 'Write failed')
        const post = (data.posts || [])[0]
        if (!post) throw new Error('No post returned from server')
        const blogUrl = `https://shanasells.com/blog/post.html?slug=${encodeURIComponent(post.slug)}`
        if (resultEl) resultEl.innerHTML = `<div class="write-result">✓ Written: <strong>${escHtml(post.title || idea.title)}</strong> — queued in <a href="/admin/va-queue/">Media Queue</a> · <a href="${blogUrl}" target="_blank">Preview →</a></div>`
        if (btn) btn.remove()
        setArticleStatus(idea.rawId, 'approved')
        idea.status = 'approved'
        updateCounts()
        showToast('Post written — review in Media Queue')
        return
      }

      // Scored-idea path (unchanged)
      res = await fetch(secret ? `/api/content/ideas?secret=${encodeURIComponent(secret)}` : '/api/content/ideas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      })
      data = await res.json()

      if (!res.ok) {
        if (res.status === 422 && data.violations) {
          const msgs = data.violations.map(v => `<div>• ${escHtml(v.reason)}: <em>${escHtml(v.excerpt)}</em></div>`).join('')
          if (resultEl) resultEl.innerHTML = `<div class="write-error"><strong>Fair Housing violation — not published</strong>${msgs}</div>`
        } else {
          if (resultEl) resultEl.innerHTML = `<div class="write-error">${escHtml(data.error || 'Write failed')}</div>`
        }
        if (btn) { btn.disabled = false; btn.textContent = 'Write & Publish →' }
        return
      }

      let resultHtml = `<div class="write-result">✓ Written: <strong>${escHtml(data.title)}</strong> — queued in <a href="/admin/va-queue/">Media Queue</a> for thumbnail + video</div>`
      if (data.fhSeverity === 'warning') {
        resultHtml += `<div class="fh-warning">⚠️ Fair Housing review: warnings flagged — review before sharing</div>`
      }
      if (resultEl) resultEl.innerHTML = resultHtml
      if (btn) btn.remove()

      if (idea) idea.status = 'approved'
      updateCounts()
      showToast('Post written — review in Media Queue')
    } catch (err) {
      if (resultEl) resultEl.innerHTML = `<div class="write-error">${escHtml(err.message || 'Network error — try again')}</div>`
      if (btn) { btn.disabled = false; btn.textContent = 'Write & Publish →' }
    }
  }

  // ── Utils ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return ''
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  let toastTimer
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.style.background = isError ? '#1f0a0a' : '#141414'
    t.style.borderColor = isError ? 'rgba(239,68,68,0.3)' : 'rgba(255,255,255,0.08)'
    t.classList.add('show')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000)
  }

  renderSidebarCategories()
  loadIdeas()
</script>
  <script src="/admin/admin-nav.js" defer></script>
</body>
</html>
